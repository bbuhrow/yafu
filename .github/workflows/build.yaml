# .github/workflows/build-windows.yml
#
# GitHub Actions CI/CD for YAFU — Windows MSYS2/MinGW-64
# Uses Makefile.new (unified Linux/MSYS2 makefile)
#
# OS detection:   Automatic — the Makefile reads the Windows_NT env var that
#                 GitHub's windows-latest runner always provides. No WIN= flag needed.
#
# GMP and GMP-ECM are both built from source as fully static libraries.
# The MSYS2 GMP package ships a DLL-mode gmp.h which prevents ECM from building
# statically, so we bypass it entirely and build our own static GMP first.
# Both are cached — they only rebuild when you bump the version variables below.
#
# Static linking: STATIC_WIN=1 produces a standalone .exe with no DLL dependencies,
#                 confirmed to run in both MSYS2 and cmd.exe/PowerShell.

name: Build YAFU Windows (MSYS2/MinGW-64)

on:
  push:
    branches: [ master ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

env:
  # GMP — update version here to force a rebuild
  GMP_VERSION: 6.3.0
  # Primary: GNU official FTP mirror (more reliable than gmplib.org for CI)
  # Fallback mirrors are tried in the build step if the primary fails
  GMP_URL: https://ftp.gnu.org/gnu/gmp/gmp-6.3.0.tar.xz

  # GMP-ECM — GitHub mirror of https://gitlab.inria.fr/zimmerma/ecm
  # 0ab79ad is the 7.0.5 release commit. Update this SHA to pick up a newer version.
  ECM_REPO:   https://github.com/sethtroisi/gmp-ecm.git
  ECM_COMMIT: 0ab79ad

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # BUILD — one parallel runner per CPU target
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    runs-on: windows-latest
    name: ${{ matrix.artifact_name }}

    strategy:
      fail-fast: false    # finish all targets even if one fails

      matrix:
        include:

          # Any x86-64 CPU — widest compatibility
          - target:        generic
            make_flags:    "ECM=1 OMP=1 MINGW=1 STATIC_WIN=1"
            artifact_name: yafu-windows-generic.exe

          # SSE 4.1 — Intel Core 2 / Penryn (2008) and newer
          - target:        sse41
            make_flags:    "ECM=1 OMP=1 MINGW=1 STATIC_WIN=1 USE_SSE41=1"
            artifact_name: yafu-windows-sse41.exe

          # AVX2 + BMI2 — Haswell (2013) and newer, recommended for most users
          - target:        avx2
            make_flags:    "ECM=1 OMP=1 MINGW=1 STATIC_WIN=1 USE_AVX2=1 USE_BMI2=1"
            artifact_name: yafu-windows-avx2.exe

          # AVX-512 F/BW — Skylake-X, Cascade Lake, Zen 4
          - target:        avx512
            make_flags:    "ECM=1 OMP=1 MINGW=1 STATIC_WIN=1 USE_AVX512=1"
            artifact_name: yafu-windows-avx512.exe

          # AVX-512 + IFMA — Ice Lake and later, best ECM performance
          - target:        avx512ifma
            make_flags:    "ECM=1 OMP=1 MINGW=1 STATIC_WIN=1 USE_AVX512IFMA=1"
            artifact_name: yafu-windows-avx512ifma.exe

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 2. Cache pacman packages ──────────────────────────────────────────────
      - name: Cache MSYS2 packages
        uses: actions/cache@v4
        with:
          path: C:\msys64\var\cache\pacman\pkg
          key: msys2-mingw64-${{ hashFiles('.github/workflows/build-windows.yml') }}

      # ── 3. MSYS2 + MinGW-64 toolchain ────────────────────────────────────────
      # We do NOT install mingw-w64-x86_64-gmp here — its DLL-mode gmp.h would
      # prevent ECM from building statically. We build our own static GMP instead.
      - name: Set up MSYS2 / MinGW-64
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            autoconf
            automake
            libtool
            make
            git

      # ── 4. Build static GMP from source (cached) ─────────────────────────────
      - name: Cache static GMP
        id: cache-gmp
        uses: actions/cache@v4
        with:
          path: C:\msys64\home\runneradmin\gmp-install
          key: gmp-${{ env.GMP_VERSION }}-static-mingw64

      - name: Build static GMP from source
        if: steps.cache-gmp.outputs.cache-hit != 'true'
        shell: msys2 {0}
        run: |
          cd ~
          # Try mirrors in order until one succeeds
          for url in \
            "https://ftp.gnu.org/gnu/gmp/gmp-${{ env.GMP_VERSION }}.tar.xz" \
            "https://mirrors.kernel.org/gnu/gmp/gmp-${{ env.GMP_VERSION }}.tar.xz" \
            "https://gmplib.org/download/gmp/gmp-${{ env.GMP_VERSION }}.tar.xz"; do
            curl -L --retry 3 --retry-delay 5 "$url" -o gmp.tar.xz && break
            echo "Mirror $url failed, trying next..."
          done
          tar xf gmp.tar.xz
          cd gmp-${{ env.GMP_VERSION }}
          ./configure \
            --prefix="$HOME/gmp-install" \
            --enable-static \
            --disable-shared \
            --host=x86_64-w64-mingw32 \
            --build=x86_64-w64-mingw32 \
            ABI=64
          make -j$(nproc)
          make install

      # ── 5. Build static GMP-ECM from source (cached) ─────────────────────────
      # With a static-only GMP, ECM's configure is happy to build statically.
      - name: Cache static GMP-ECM
        id: cache-ecm
        uses: actions/cache@v4
        with:
          path: C:\msys64\home\runneradmin\ecm-install
          key: gmp-ecm-${{ env.ECM_COMMIT }}-gmp-${{ env.GMP_VERSION }}-static-mingw64

      - name: Build static GMP-ECM from source
        if: steps.cache-ecm.outputs.cache-hit != 'true'
        shell: msys2 {0}
        run: |
          cd ~
          git clone ${{ env.ECM_REPO }} ecm-src
          cd ecm-src
          git checkout ${{ env.ECM_COMMIT }}
          autoreconf -i
          ./configure \
            --prefix="$HOME/ecm-install" \
            --with-gmp="$HOME/gmp-install" \
            --enable-static \
            --disable-shared
          make -j$(nproc)
          make install

      # ── 6. Show resolved build configuration (useful for debugging failures) ──
      - name: Show build config (${{ matrix.target }})
        shell: msys2 {0}
        run: |
          make -f Makefile.new info \
            ${{ matrix.make_flags }} \
            GMP_PREFIX="$HOME/gmp-install" \
            ECM_PREFIX="$HOME/ecm-install"

      # ── 7. Build ──────────────────────────────────────────────────────────────
      - name: Build (${{ matrix.target }})
        shell: msys2 {0}
        run: |
          make -f Makefile.new yafu \
            ${{ matrix.make_flags }} \
            GMP_PREFIX="$HOME/gmp-install" \
            ECM_PREFIX="$HOME/ecm-install"

      # ── 8. Rename to target-specific name ────────────────────────────────────
      - name: Stage artifact
        shell: msys2 {0}
        run: cp yafu.exe ${{ matrix.artifact_name }}

      # ── 9. Verify fully static — no DLL dependencies ─────────────────────────
      # objdump -p lists imported DLLs. A truly static binary imports only
      # Windows system DLLs (kernel32, msvcrt, etc.), never libgmp or libecm.
      - name: Verify static linkage (${{ matrix.target }})
        shell: msys2 {0}
        run: |
          echo "=== DLL imports ==="
          objdump -p ${{ matrix.artifact_name }} | grep "DLL Name" || true
          echo "=== Checking for unexpected DLL deps ==="
          if objdump -p ${{ matrix.artifact_name }} | grep -i "DLL Name" | \
             grep -iE "gmp|ecm|gomp|winpthread"; then
            echo "::error::Unexpected DLL dependency found — binary is not fully static"
            exit 1
          else
            echo "OK: no unexpected DLL dependencies"
          fi

      # ── 10. Upload (retained 30 days on every push/PR) ───────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          retention-days: 30

      # ── 11. Smoke test ────────────────────────────────────────────────────────
      # AVX-512 targets are skipped: GitHub's Azure VMs don't support AVX-512
      # at runtime, so the binary would fault. The build itself is still verified.
      - name: Smoke test (${{ matrix.target }})
        shell: msys2 {0}
        if: ${{ !contains(matrix.target, 'avx512') }}
        run: |
          echo "Binary size: $(ls -lh ${{ matrix.artifact_name }} | awk '{print $5}')"
          ./${{ matrix.artifact_name }} "factor(12345678901234567)" \
            && echo "SMOKE TEST PASSED" \
            || echo "::warning::Smoke test failed for ${{ matrix.target }}"

  # ─────────────────────────────────────────────────────────────────────────────
  # RELEASE — only on version tags (e.g. git tag v2.1.0 && git push --tags)
  # Collects all .exe artifacts and attaches them to a GitHub Release.
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.exe
          generate_release_notes: true
          body: |
            ## Windows Binaries

            All builds are fully static — no extra DLLs required, runs in cmd.exe and PowerShell.

            | File | Best for |
            |------|----------|
            | `yafu-windows-generic.exe`    | Any x86-64 CPU — widest compatibility |
            | `yafu-windows-sse41.exe`      | Intel Core 2 / Penryn (2008) and newer |
            | `yafu-windows-avx2.exe`       | Haswell (2013) and newer — **recommended for most users** |
            | `yafu-windows-avx512.exe`     | Skylake-X / Cascade Lake / Zen 4 (AVX-512) |
            | `yafu-windows-avx512ifma.exe` | Ice Lake and newer — best ECM performance |

            Not sure which to pick? Run `wmic cpu get name` in a Windows command prompt,
            then look up your CPU generation, or just start with `avx2` — it works on nearly every CPU sold since 2015.

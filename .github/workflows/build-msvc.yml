# .github/workflows/build-msvc.yml
#
# GitHub Actions CI/CD for YAFU — Windows MSVC/ClangCL
# Builds the existing build.vc22 Visual Studio solution.
#
# ISA matrix:   Controlled by /p:YafuISA=<target> passed to MSBuild.
#               isa_target.props translates this into the correct
#               EnableEnhancedInstructionSet and PreprocessorDefinitions
#               for every sub-project in the solution automatically.
#
# MPIR:         Built from source using the optimised configuration that
#               best matches each ISA target (skylake_avx for avx2,
#               skylake_avx for avx512/avx512ifma, gc for generic/sse41).
#               Cached by commit SHA + config name.
#
# GMP-ECM:      Built from source using its own MSVC project.
#               Cached by commit SHA.
#
# Toolset:      ClangCL for x64 Release (as configured in yafu.vcxproj).
#               The windows-2025 runner ships LLVM 20 as the VS ClangCL
#               toolset, no additional installation needed.
#
# YASM:         Not required — mod64.asm has been replaced by mod64.c.

name: Build YAFU (MSVC/ClangCL)

on:
  push:
    branches: [ master ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

env:
  # MPIR — BrianGladman's MSVC-compatible GMP fork
  # Pin to a specific commit SHA for reproducibility; update to pick up fixes.
  MPIR_REPO:   https://github.com/BrianGladman/mpir.git
  MPIR_COMMIT: master

  # GMP-ECM — GitHub mirror of https://gitlab.inria.fr/zimmerma/ecm
  # Keep in sync with build-windows.yml and build-linux.yml.
  ECM_REPO:    https://github.com/sethtroisi/gmp-ecm.git
  ECM_COMMIT:  0ab79ad
  
  # pthreads — BrianGladman's MSVC-compatible pthreads-win32
  PTHREADS_REPO:   https://github.com/BrianGladman/pthreads.git
  PTHREADS_COMMIT: master

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # BUILD — one parallel runner per ISA target
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    runs-on: windows-2025
    name: yafu-${{ matrix.toolset }}-${{ matrix.isa }}

    strategy:
      fail-fast: false

      matrix:
        include:

          # ── ClangCL builds ───────────────────────────────────────────────
          # Note: avx512ifma is excluded — MSVC's EnableEnhancedInstructionSet
          # has no distinct IFMA value. IFMA intrinsics are available under
          # /arch:AVX512 but there is no separate compiler switch in VS 2022
          # or VS 2026. Use the MinGW/Linux workflows for avx512ifma builds.
          - toolset: ClangCL
            isa:         generic
            mpir_config: lib_mpir_gc
            artifact_name: yafu-clangcl-generic.exe

          - toolset: ClangCL
            isa:         sse41
            mpir_config: lib_mpir_gc
            artifact_name: yafu-clangcl-sse41.exe

          - toolset: ClangCL
            isa:         avx2
            mpir_config: lib_mpir_skylake_avx
            artifact_name: yafu-clangcl-avx2.exe

          - toolset: ClangCL
            isa:         avx512
            mpir_config: lib_mpir_skylake_avx
            artifact_name: yafu-clangcl-avx512.exe


          # ── MSVC (v143) builds ───────────────────────────────────────────
          - toolset: v143
            isa:         generic
            mpir_config: lib_mpir_gc
            artifact_name: yafu-msvc-generic.exe

          - toolset: v143
            isa:         sse41
            mpir_config: lib_mpir_gc
            artifact_name: yafu-msvc-sse41.exe

          - toolset: v143
            isa:         avx2
            mpir_config: lib_mpir_skylake_avx
            artifact_name: yafu-msvc-avx2.exe

          - toolset: v143
            isa:         avx512
            mpir_config: lib_mpir_skylake_avx
            artifact_name: yafu-msvc-avx512.exe


    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout yafu
        uses: actions/checkout@v6

      # ── 2. Set up MSBuild ─────────────────────────────────────────────────────
      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      # ── 3. Build MPIR (cached per config) ────────────────────────────────────
      # MPIR is built with its own VS project. Each ISA target uses a different
      # optimised configuration; the cache key includes both commit and config
      # so changing either forces a rebuild.
      - name: Cache MPIR (${{ matrix.mpir_config }})
        id: cache-mpir
        uses: actions/cache@v5
        with:
          path: C:\deps\mpir-${{ matrix.mpir_config }}
          key: mpir-${{ env.MPIR_COMMIT }}-${{ matrix.mpir_config }}-msvc

      - name: Clone MPIR
        if: steps.cache-mpir.outputs.cache-hit != 'true'
        run: |
          git clone ${{ env.MPIR_REPO }} C:\deps\mpir-src
          cd C:\deps\mpir-src
          git checkout ${{ env.MPIR_COMMIT }}

      - name: Build MPIR (${{ matrix.mpir_config }})
        if: steps.cache-mpir.outputs.cache-hit != 'true'
        run: |
          cd C:\deps\mpir-src
          # always use lib_mpir_gc instead of ${{ matrix.mpir_config }}
          msbuild msvc\vs26\lib_mpir_gc\lib_mpir_gc.vcxproj `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:RuntimeLibrary=MultiThreaded
          # Stage headers and lib to a clean install prefix
          # Output lands in x64\Release\ relative to the project file directory
          New-Item -ItemType Directory -Force C:\deps\mpir-lib_mpir_gc\include
          New-Item -ItemType Directory -Force C:\deps\mpir-lib_mpir_gc\lib
          New-Item -ItemType Directory -Force C:\deps\mpir-lib_mpir_gc\lib\x64
          New-Item -ItemType Directory -Force C:\deps\mpir-lib_mpir_gc\lib\x64\Release
          # always use lib_mpir_gc instead of ${{ matrix.mpir_config }}
          Copy-Item msvc\vs26\lib_mpir_gc\x64\Release\mpir.lib `
            C:\deps\mpir-lib_mpir_gc\lib\
          Copy-Item mpir.h `
            C:\deps\mpir-lib_mpir_gc\include\
          # gmp.h is a compatibility shim — copy if present
          Copy-Item gmp.h `
            C:\deps\mpir-lib_mpir_gc\include\ `
            -ErrorAction SilentlyContinue
          # ECM's libecm.vcxproj AdditionalIncludeDirectories resolves to
          # $(mp_dir) directly, so headers must live alongside mpir.lib
          Copy-Item mpir.h `
            C:\deps\mpir-lib_mpir_gc\lib\x64\Release\
          Copy-Item gmp.h `
            C:\deps\mpir-lib_mpir_gc\lib\x64\Release\

      # ── 4. Build GMP-ECM (cached) ─────────────────────────────────────────────
      # ECM is built once and shared across all ISA targets — the lib itself
      # doesn't need ISA-specific builds since yafu's own ECM code handles that.
      - name: Cache GMP-ECM
        id: cache-ecm
        uses: actions/cache@v5
        with:
          path: C:\deps\ecm-install
          key: gmp-ecm-${{ env.ECM_COMMIT }}-msvc

      - name: Install YASM (required by ECM assembler)
        if: steps.cache-ecm.outputs.cache-hit != 'true'
        run: |
          choco install yasm --no-progress -y
          # ECM's vsyasm.targets looks for vsyasm.exe specifically.
          # Copy yasm.exe alongside itself with that name in the same folder.
          Copy-Item "C:\ProgramData\chocolatey\lib\yasm\tools\yasm.exe" `
            "C:\ProgramData\chocolatey\lib\yasm\tools\vsyasm.exe" 

      - name: Clone GMP-ECM
        if: steps.cache-ecm.outputs.cache-hit != 'true'
        run: |
          git clone ${{ env.ECM_REPO }} C:\deps\ecm-src
          cd C:\deps\ecm-src
          git checkout ${{ env.ECM_COMMIT }}

      - name: List MPIR build folder (debug)
        if: steps.cache-ecm.outputs.cache-hit != 'true'
        run: |
          Write-Host "=== mpir-lib_mpir_gc lib ==="
          Get-ChildItem -Recurse "C:\deps\mpir-lib_mpir_gc" | Select-Object FullName

      - name: Patch GMP-ECM project (remove unconditional CUDA imports)
        if: steps.cache-ecm.outputs.cache-hit != 'true'
        run: |
          # The ECM vcxproj unconditionally imports CUDA props/targets even
          # when CUDA is not in use, causing MSB4019 on runners without the
          # matching toolkit. Filter out any line that mentions CUDA.
          $proj = 'C:\deps\ecm-src\build.vs\ecm\ecm.vcxproj'
          $lines = Get-Content $proj
          $lines = $lines | Where-Object { $_ -notlike '*CUDA*' }
          Set-Content $proj $lines


      - name: Build GMP-ECM
        if: steps.cache-ecm.outputs.cache-hit != 'true'
        run: |
          cd C:\deps\ecm-src
          # ECM's MSVC build requires MPIR — point it at our gc build
          # (generic enough for building the ECM library itself)
          # always use lib_mpir_gc instead of ${{ matrix.mpir_config }}
          msbuild build.vs\libecm\libecm.vcxproj `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:YASM_PATH="C:\ProgramData\chocolatey\lib\yasm\tools\" `
            /p:mp_dir=mpir-lib_mpir_gc\lib\ `
            /p:RuntimeLibrary=MultiThreaded
          # Stage headers and lib
          New-Item -ItemType Directory -Force C:\deps\ecm-install\lib\x64\Release
          Copy-Item build.vs\lib\x64\Release\libecm.lib `
            C:\deps\ecm-install\lib\x64\Release\
          Copy-Item ecm.h C:\deps\ecm-install\

      # ── 4.5. Build pthreads (cached) ───────────────────────────────────────────
      # Built with nmake VC-static target which produces a static lib with /MT,
      # matching yafu's RuntimeLibrary setting.
      # Staged to pthreads-old\ relative to the solution so yafu finds it at
      # the path its project files expect: pthreads-old\pthread.h and
      # pthreads-old\lib\x64\Release\pthreads.lib
      - name: Cache pthreads
        id: cache-pthreads
        uses: actions/cache@v5
        with:
          path: C:\deps\pthreads-install
          key: pthreads-${{ env.PTHREADS_COMMIT }}-msvc
          
      - name: Build pthreads from source
        if: steps.cache-pthreads.outputs.cache-hit != 'true'
        shell: cmd
        run: |
          :: Locate vcvarsall.bat dynamically using vswhere so this works
          :: regardless of VS version or edition on the runner.
          for /f "usebackq delims=" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath`) do set VS_PATH=%%i
          call "%VS_PATH%\VC\Auxiliary\Build\vcvarsall.bat" x64
          git clone ${{ env.PTHREADS_REPO }} C:\deps\pthreads-src
          cd C:\deps\pthreads-src
          git checkout ${{ env.PTHREADS_COMMIT }}
          nmake VC-static
          mkdir C:\deps\pthreads-old\lib\x64\Release
          copy x64\Release\pthreadVC2.lib C:\deps\pthreads-old\lib\x64\Release\pthreads.lib
          copy pthread.h C:\deps\pthreads-old\
          copy semaphore.h C:\deps\pthreads-old\
          copy sched.h C:\deps\pthreads-old\
            
      # ── 5. Build yafu ─────────────────────────────────────────────────────────
      # ISA flags propagate automatically via isa_target.props, which is imported
      # by libs_and_extensions.props, which every sub-project already imports.
      # The hardcoded EnableEnhancedInstructionSet in yafu.vcxproj Release|x64
      # must be removed for this to work (see migration notes).
      # always use lib_mpir_gc instead of ${{ matrix.mpir_config }}
      - name: Build yafu (${{ matrix.toolset }}-${{ matrix.isa }})
        run: |
          msbuild build.vc22\yafu.sln `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:YafuToolset=${{ matrix.toolset }} `
            /p:PlatformToolset=${{ matrix.toolset }} `
            /p:YafuISA=${{ matrix.isa }} `
            /p:mp_dir=C:\deps\mpir-lib_mpir_gc\lib\x64\Release `
            /p:ecm_dir=C:\deps\ecm-install\ `
            /m

      # ── 6. Stage artifact ─────────────────────────────────────────────────────
      - name: Stage artifact
        run: |
          Copy-Item bin\x64\Release\yafu-x64.exe ${{ matrix.artifact_name }}

      # ── 7. Verify static linkage ──────────────────────────────────────────────
      # A statically linked binary imports only Windows system DLLs.
      # dumpbin /dependents lists runtime DLL dependencies.
      - name: Verify static linkage (${{ matrix.isa }})
        run: |
          $deps = & "dumpbin.exe" /dependents ${{ matrix.artifact_name }} 2>&1
          Write-Host $deps
          $bad = $deps | Select-String -Pattern "mpir|ecm|vcruntime|msvcp" -CaseSensitive:$false
          if ($bad) {
            Write-Error "Unexpected DLL dependency found — binary may not be fully static:`n$bad"
            exit 1
          } else {
            Write-Host "OK: no unexpected DLL dependencies"
          }

      # ── 8. Upload (retained 30 days on every push/PR) ────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          retention-days: 30

      # ── 9. Smoke test ─────────────────────────────────────────────────────────
      # AVX-512 targets are skipped — GitHub's Azure VMs don't support AVX-512.
      - name: Smoke test (${{ matrix.isa }})
        if: ${{ !contains(matrix.isa, 'avx512') }}
        run: |
          Write-Host "Binary size: $((Get-Item ${{ matrix.artifact_name }}).Length) bytes"
          .\${{ matrix.artifact_name }} "factor(12345678901234567)"
          if ($LASTEXITCODE -eq 0) {
            Write-Host "SMOKE TEST PASSED"
          } else {
            Write-Warning "Smoke test failed for ${{ matrix.isa }}"
          }

  # ─────────────────────────────────────────────────────────────────────────────
  # RELEASE — attaches MSVC binaries to the same GitHub Release as the
  # MinGW and Linux workflows. All three workflows target the same v* tag
  # so GitHub merges their uploads into one release automatically.
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts/
          merge-multiple: true

      - name: Upload MSVC binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/yafu-clangcl-*.exe
            artifacts/yafu-msvc-*.exe
